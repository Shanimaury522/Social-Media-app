<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora - Ultra Fast Search</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: #020617; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        .glass-bg {
            background: radial-gradient(circle at top right, #1e293b, #020617);
            height: 100vh; display: flex; flex-direction: column;
        }

        /* --- High Speed Search Header --- */
        .search-header {
            padding: 20px;
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn { background: none; border: none; color: white; cursor: pointer; }

        .search-box {
            flex: 1; background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; display: flex; align-items: center;
            padding: 2px 15px; transition: 0.3s;
        }

        .search-box:focus-within {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        input {
            width: 100%; background: none; border: none; color: white;
            padding: 12px 5px; font-size: 16px; outline: none;
        }

        /* --- Results Area --- */
        #results {
            flex: 1; overflow-y: auto; padding: 20px;
            scrollbar-width: none;
        }
        #results::-webkit-scrollbar { display: none; }

        .result-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px; border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px; cursor: pointer;
            transition: 0.2s; animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-item:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.08); }

        .res-icon { 
            width: 50px; height: 50px; border-radius: 12px; 
            background: linear-gradient(45deg, #1e293b, #334155);
            display: flex; align-items: center; justify-content: center;
            color: #4facfe;
        }

        .res-info h4 { margin: 0; font-size: 15px; }
        .res-info p { margin: 4px 0 0; font-size: 12px; color: #94a3b8; }

        /* --- Trending Tags --- */
        .trending { padding: 0 20px 20px; }
        .tag-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .tag {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 8px 16px; border-radius: 20px; font-size: 13px;
            white-space: nowrap; font-weight: 600;
        }

        svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

<div class="glass-bg">
    <div class="search-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div class="search-box">
            <svg style="color: #64748b;" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" placeholder="Search videos, creators..." oninput="fastSearch()">
        </div>
    </div>

    <div class="trending" id="trending-sec">
        <p style="font-size: 13px; color: #94a3b8; margin: 15px 0 10px;">Trending on Nexora</p>
        <div class="tag-row">
            <div class="tag">#AI2026</div>
            <div class="tag">#NexoraPremium</div>
            <div class="tag">#CryptoTech</div>
            <div class="tag">#FuturisticUI</div>
        </div>
    </div>

    <div id="results">
        <p style="text-align: center; color: #444; margin-top: 50px;">Start typing to search...</p>
    </div>
</div>

<script>
    // Dummy Data (In production, this comes from your database)
    const database = [
        { title: "Future of AI", creator: "Nexora Official", views: "2M" },
        { title: "How to build Glass UI", creator: "Design Master", views: "500K" },
        { title: "Quantum Computing", creator: "Tech Insider", views: "1.2M" },
        { title: "Nexora Wallet Tutorial", creator: "Finance Guru", views: "80K" },
        { title: "Space Exploration 2026", creator: "Galactic TV", views: "4M" }
    ];

    function fastSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultsDiv = document.getElementById('results');
        const trendingSec = document.getElementById('trending-sec');

        if (query.length > 0) {
            trendingSec.style.display = 'none';
            // Fast Filter Logic
            const filtered = database.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.creator.toLowerCase().includes(query)
            );

            if (filtered.length > 0) {
                resultsDiv.innerHTML = filtered.map(item => `
                    <div class="result-item" onclick="location.href='watch.html'">
                        <div class="res-icon">
                            <svg viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                        </div>
                        <div class="res-info">
                            <h4>${item.title}</h4>
                            <p>${item.creator} • ${item.views} views</p>
                        </div>
                    </div>
                `).join('');
            } else {
                resultsDiv.innerHTML = `<p style="text-align:center; color:#666;">No results found for "${query}"</p>`;
            }
        } else {
            trendingSec.style.display = 'block';
            resultsDiv.innerHTML = `<p style="text-align: center; color: #444; margin-top: 50px;">Start typing to search...</p>`;
        }
    }
</script>

</body>
</html>
