<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Dark Glass UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1a1a2e 0%, #0a0a0c 100%);
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* --- TOP NAV (3 Icons Linked) --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .top-nav a {
            color: #b0b0b0;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .top-nav a:hover { color: var(--accent-blue); }

        /* --- FOOTER NAV (5 Icons Linked) --- */
        .footer-container {
            position: fixed;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .footer-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 12px 0;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .footer-nav a {
            color: #888;
            font-size: 18px;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .footer-nav a:hover, .footer-nav a.active {
            color: #fff;
            transform: scale(1.2);
        }

        .plus-btn {
            background: linear-gradient(135deg, #3a3a4a 0%, #1a1a1a 100%);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 24px !important;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .content { padding: 100px 20px; text-align: center; }
        .card { background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        
        <h2 style="margin:0; font-size: 1.2rem; letter-spacing: 1px;">NEXORA</h2>
        
        <div style="display: flex; gap: 20px;">
            <a href="wallet.html"><i class="fa-solid fa-wallet"></i></a>
            <a href="notifications.html"><i class="fa-solid fa-bell"></i></a>
        </div>
    </header>

    <div class="content">
        <div class="card">
            <h3>Ready to Explore?</h3>
            <p style="color: #888;">Dark Glass UI is now linked.</p>
        </div>
    </div>

    <div class="footer-container">
        <nav class="footer-nav">
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i></a>
            <a href="reels.html"><i class="fa-solid fa-clapperboard"></i></a>
            <a href="upload.html" class="plus-btn"><i class="fa-solid fa-plus"></i></a>
            <a href="subscription.html"><i class="fa-solid fa-gem"></i></a>
            <a href="profile.html"><i class="fa-solid fa-user"></i></a>
        </nav>
    </div>

</body>
</html>
