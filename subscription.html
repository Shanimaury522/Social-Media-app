<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Subscriptions Full</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #0f172a; 
            color: white; font-family: 'Segoe UI', sans-serif; 
        }

        /* Top Filter Bar */
        .creator-bar {
            display: flex; overflow-x: auto; padding: 15px;
            gap: 18px; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .creator-bar::-webkit-scrollbar { display: none; }
        
        .creator-item { text-align: center; min-width: 65px; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .creator-item.active { opacity: 1; transform: scale(1.05); }
        
        .creator-avatar { 
            width: 55px; height: 55px; border-radius: 50%; 
            border: 2px solid transparent; padding: 2px; background: #1e293b;
        }

        .active .creator-avatar { 
            border-color: #3b82f6; 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .creator-name { font-size: 11px; margin-top: 6px; font-weight: 500; white-space: nowrap; }

        /* Video Feed */
        .sub-feed { padding: 15px; padding-bottom: 50px; }
        .video-card { 
            margin-bottom: 25px; border-radius: 15px; overflow: hidden; 
            background: #1e293b; transition: 0.2s; cursor: pointer;
        }
        .video-card:active { transform: scale(0.98); }
        
        .thumbnail-box { width: 100%; aspect-ratio: 16/9; background: #334155; position: relative; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        .video-info { padding: 12px; display: flex; gap: 12px; }
        .channel-pic { width: 38px; height: 38px; border-radius: 50%; background: #475569; border: 1px solid rgba(255,255,255,0.1); }
        .text-data { flex: 1; }
        .v-title { font-size: 15px; font-weight: bold; margin-bottom: 4px; color: #f1f5f9; line-height: 1.3; }
        .v-meta { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="creator-bar" id="channelFilter">
        <div class="creator-item active" onclick="filterVideos('all', this)">
            <div class="creator-avatar" style="display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; background:#334155;">ALL</div>
            <div class="creator-name">All</div>
        </div>
        
        <div class="creator-item" onclick="filterVideos('Alex Tech', this)">
            <img src="https://via.placeholder.com/55/3b82f6/fff" class="creator-avatar">
            <div class="creator-name">Alex Tech</div>
        </div>

        <div class="creator-item" onclick="filterVideos('Nexora Gaming', this)">
            <img src="https://via.placeholder.com/55/f59e0b/fff" class="creator-avatar">
            <div class="creator-name">Nexora Gaming</div>
        </div>
    </div>

    <div class="sub-feed" id="mainFeed">
        
        <div class="video-card" data-channel="Alex Tech" onclick="goToWatch('Nexora OS 3.0 Setup', 'Alex Tech', '12K', '2h ago')">
            <div class="thumbnail-box">
                <div class="duration">10:24</div>
                </div>
            <div class="video-info">
                <div class="channel-pic"></div>
                <div class="text-data">
                    <div class="v-title">Nexora OS 3.0 Setup Guide</div>
                    <div class="v-meta">Alex Tech • 12K views • 2h ago</div>
                </div>
            </div>
        </div>

        <div class="video-card" data-channel="Nexora Gaming" onclick="goToWatch('Cyberpunk Gameplay', 'Nexora Gaming', '50K', '5h ago')">
            <div class="thumbnail-box">
                <div class="duration">15:45</div>
            </div>
            <div class="video-info">
                <div class="channel-pic"></div>
                <div class="text-data">
                    <div class="v-title">Playing Cyberpunk on Nexora Cloud</div>
                    <div class="v-meta">Nexora Gaming • 50K views • 5h ago</div>
                </div>
            </div>
        </div>

        <div class="video-card" data-channel="Alex Tech" onclick="goToWatch('Nexora vs Others', 'Alex Tech', '5K', '1d ago')">
            <div class="thumbnail-box">
                <div class="duration">05:12</div>
            </div>
            <div class="video-info">
                <div class="channel-pic"></div>
                <div class="text-data">
                    <div class="v-title">Why Nexora is better than others?</div>
                    <div class="v-meta">Alex Tech • 5K views • 1d ago</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. Filtering Logic
        function filterVideos(channelName, element) {
            const items = document.querySelectorAll('.creator-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            const videos = document.querySelectorAll('.video-card');
            videos.forEach(video => {
                if(channelName === 'all') {
                    video.style.display = 'block';
                } else {
                    if(video.getAttribute('data-channel') === channelName) {
                        video.style.display = 'block';
                    } else {
                        video.style.display = 'none';
                    }
                }
            });
        }

        // 2. Navigation Logic (Watch Page Pe Janne Ke Liye)
        function goToWatch(title, channel, views, time) {
            // Ye URL me saara data pack karke bhej dega
            const url = `watch.html?title=${encodeURIComponent(title)}&channel=${encodeURIComponent(channel)}&views=${encodeURIComponent(views)}&time=${encodeURIComponent(time)}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
