<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora - Ultra Watch</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: #020617; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        /* Premium Glass Background */
        .glass-bg {
            background: radial-gradient(circle at top, #1e293b, #020617);
            min-height: 100vh; padding-bottom: 20px;
        }

        /* Sticky Video Player */
        .video-container {
            width: 100%; aspect-ratio: 16/9; background: #000;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; height: 100%; }

        /* Content Padding */
        .wrapper { padding: 15px; }

        .video-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
        .stats { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }

        /* Channel Bar */
        .channel-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .user-info { display: flex; align-items: center; cursor: pointer; }
        .user-icon { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: linear-gradient(45deg, #3b82f6, #06b6d4); margin-right: 12px;
        }
        .user-name { font-weight: 600; font-size: 15px; }
        
        .sub-btn {
            background: #fff; color: #000; border: none;
            padding: 9px 18px; border-radius: 25px; font-weight: 700;
            font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .sub-btn.active { background: rgba(255,255,255,0.15); color: #fff; }

        /* Action Buttons */
        .action-row {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: none;
        }
        .action-row::-webkit-scrollbar { display: none; }
        
        .btn {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 10px 18px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px; font-weight: 600; cursor: pointer;
            white-space: nowrap; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }
        .btn.liked { color: #3b82f6; border-color: #3b82f6; }
        svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- PREMIUM COMMENT BOX --- */
        .comment-trigger {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px; padding: 15px; margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .comment-preview { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #cbd5e1; }
        .small-avatar { width: 24px; height: 24px; border-radius: 50%; background: #475569; }

        /* Comment Modal (Overlay) */
        #commentModal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.2);
            z-index: 1000; transition: 0.4s ease-out;
            border-radius: 30px 30px 0 0; display: flex; flex-direction: column;
        }
        #commentModal.open { bottom: 0; }
        .modal-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .close-bar { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 10px auto; }
        
        .comment-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment-input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .comment-input { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 12px 15px; border-radius: 20px; color: white; outline: none; }
    </style>
</head>
<body>

<div class="glass-bg">
    <div class="video-container">
        <video id="mainVideo" controls poster="https://via.placeholder.com/640x360/0f172a/ffffff?text=Nexora+Video">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="wrapper">
        <div class="video-title">The Future of AI Architecture in 2026</div>
        <div class="stats">105K views • 2 hours ago</div>

        <div class="channel-bar">
            <div class="user-info" onclick="location.href='channel.html'">
                <div class="user-icon"></div>
                <div>
                    <div class="user-name">Nexora Creator</div>
                    <div style="font-size: 11px; color: #94a3b8;">2.4M Subscribers</div>
                </div>
            </div>
            <button id="subBtn" class="sub-btn" onclick="toggleSub()">Subscribe</button>
        </div>

        <div class="action-row">
            <button class="btn" id="likeBtn" onclick="handleLike()">
                <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                <span id="likeCount">0</span>
            </button>
            <button class="btn" onclick="alert('Disliked')">
                <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.37-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
            </button>
            <button class="btn" onclick="alert('Link Copied')">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                <span>Share</span>
            </button>
            <button class="btn">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                <span>Download</span>
            </button>
        </div>

        <div class="comment-trigger" onclick="openComments()">
            <div class="comment-header">
                <span>Comments <span style="color:#94a3b8; font-weight:normal; margin-left:5px;">242</span></span>
                <svg style="width:16px;" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="comment-preview">
                <div class="small-avatar"></div>
                <span>Awesome video! Can't wait for more.</span>
            </div>
        </div>
    </div>
</div>

<div id="commentModal">
    <div class="close-bar" onclick="closeComments()"></div>
    <div class="modal-header">
        <h3 style="margin:0">Comments</h3>
        <button onclick="closeComments()" style="background:none; border:none; color:white; font-size:20px;">&times;</button>
    </div>
    <div class="comment-list" id="commentList">
        <p style="color:#94a3b8; font-size:14px; text-align:center">Be the first to comment...</p>
    </div>
    <div class="comment-input-area">
        <input type="text" id="commentInput" class="comment-input" placeholder="Add a comment...">
        <button onclick="postComment()" style="background:#3b82f6; border:none; color:white; padding:10px 15px; border-radius:20px; font-weight:bold;">Post</button>
    </div>
</div>

<script>
    let likes = 0;
    let isLiked = false;

    function handleLike() {
        const countSpan = document.getElementById('likeCount');
        const btn = document.getElementById('likeBtn');
        if(!isLiked) {
            likes++;
            isLiked = true;
            btn.classList.add('liked');
        } else {
            likes--;
            isLiked = false;
            btn.classList.remove('liked');
        }
        countSpan.innerText = likes;
    }

    function toggleSub() {
        const btn = document.getElementById('subBtn');
        btn.classList.toggle('active');
        btn.innerText = btn.classList.contains('active') ? "Subscribed" : "Subscribe";
    }

    // COMMENT LOGIC
    function openComments() {
        document.getElementById('commentModal').classList.add('open');
    }

    function closeComments() {
        document.getElementById('commentModal').classList.remove('open');
    }

    function postComment() {
        const input = document.getElementById('commentInput');
        const list = document.getElementById('commentList');
        if(input.value.trim() !== "") {
            if(list.querySelector('p')) list.innerHTML = ''; // Clear "Be first" text
            const newComment = document.createElement('div');
            newComment.style.marginBottom = "15px";
            newComment.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:#3b82f6;"></div>
                    <div>
                        <div style="font-size:12px; font-weight:bold; color:#94a3b8;">You</div>
                        <div style="font-size:14px; margin-top:2px;">${input.value}</div>
                    </div>
                </div>
            `;
            list.prepend(newComment);
            input.value = "";
        }
    }
</script>

</body>
</html>
