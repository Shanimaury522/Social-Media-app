<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora - Smart Notifications</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: #020617; color: white; 
            font-family: 'Segoe UI', sans-serif;
        }
        .glass-bg {
            background: radial-gradient(circle at top right, #1e293b, #020617);
            min-height: 100vh; padding: 15px;
        }
        .header { display: flex; align-items: center; padding: 10px 5px 25px; }
        .back-btn { background: none; border: none; color: white; cursor: pointer; }

        /* Filters Bar */
        .filters {
            display: flex; gap: 10px; margin-bottom: 25px;
            overflow-x: auto; scrollbar-width: none;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; padding: 8px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer;
        }
        .filter-btn.active {
            background: #3b82f6; color: white; border-color: #3b82f6;
        }

        /* Notifications */
        .notif-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px; padding: 12px;
            display: flex; align-items: flex-start; gap: 12px;
            margin-bottom: 12px; transition: 0.3s;
        }
        /* Hidden state for filtering */
        .hide { display: none; }

        .avatar { width: 45px; height: 45px; border-radius: 50%; flex-shrink: 0; }
        .notif-content { flex: 1; }
        .notif-text { font-size: 14px; color: #efefef; }
        .notif-time { font-size: 11px; color: #64748b; margin-top: 5px; }
        
        svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

<div class="glass-bg">
    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <h1 style="margin-left: 15px; font-size: 22px;">Notifications</h1>
    </div>

    <div class="filters">
        <div class="filter-btn active" onclick="filterNotif('all', this)">All</div>
        <div class="filter-btn" onclick="filterNotif('sub', this)">Subscriptions</div>
        <div class="filter-btn" onclick="filterNotif('news', this)">Nexora News</div>
    </div>

    <div id="notif-container">
        <div class="notif-card" data-cat="sub">
            <div class="avatar" style="background: #3b82f6;"></div>
            <div class="notif-content">
                <div class="notif-text"><b>John Carter</b> uploaded a new video.</div>
                <div class="notif-time">Just now</div>
            </div>
        </div>

        <div class="notif-card" data-cat="news">
            <div class="avatar" style="background: #1e293b; display: flex; align-items: center; justify-content: center;">
                <svg style="color:#3b82f6;" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.45L19.53 19H4.47L12 5.45z"/></svg>
            </div>
            <div class="notif-content">
                <div class="notif-text"><b>System Update</b>: New Wallet features added.</div>
                <div class="notif-time">2 hours ago</div>
            </div>
        </div>

        <div class="notif-card" data-cat="sub">
            <div class="avatar" style="background: #f59e0b;"></div>
            <div class="notif-content">
                <div class="notif-text"><b>Design Master</b> started a live stream.</div>
                <div class="notif-time">5 hours ago</div>
            </div>
        </div>
    </div>
</div>

<script>
    function filterNotif(category, btn) {
        // 1. Button active color change karo
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 2. Notifications filter karo
        const cards = document.querySelectorAll('.notif-card');
        
        cards.forEach(card => {
            if (category === 'all') {
                card.classList.remove('hide');
            } else {
                // Agar card ka category match karta hai toh dikhao, nahi toh hide karo
                if (card.getAttribute('data-cat') === category) {
                    card.classList.remove('hide');
                } else {
                    card.classList.add('hide');
                }
            }
        });
    }
</script>

</body>
</html>
