<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Upload Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1e1e30 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 { margin-top: 80px; font-weight: 300; letter-spacing: 2px; }

        /* --- UPLOAD GRID --- */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
        }

        .upload-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .upload-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .upload-card i {
            font-size: 40px;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-card span {
            font-size: 14px;
            font-weight: 500;
            color: #ddd;
        }

        /* Hide the actual file input */
        .file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            position: fixed;
            bottom: 25px;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }
        .footer-nav a { color: #888; font-size: 20px; text-decoration: none; }
        .footer-nav .active-plus { 
            background: var(--accent); 
            color: black; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            margin-top: -30px;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>

    <h2>CREATE</h2>

    <div class="upload-grid">
        <div class="upload-card">
            <input type="file" accept="video/*" class="file-input">
            <i class="fa-solid fa-video"></i>
            <span>Upload Video</span>
        </div>

        <div class="upload-card">
            <input type="file" accept="video/*" class="file-input">
            <i class="fa-solid fa-clapperboard"></i>
            <span>Create Reel</span>
        </div>

        <div class="upload-card">
            <input type="file" accept="video/*" class="file-input">
            <i class="fa-solid fa-tower-broadcast"></i>
            <span>Go Live</span>
        </div>

        <div class="upload-card">
            <input type="file" accept="image/*" class="file-input">
            <i class="fa-solid fa-image"></i>
            <span>Post Image</span>
        </div>
    </div>

    <nav class="footer-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard"></i></a>
        <a href="upload.html" class="active-plus"><i class="fa-solid fa-plus"></i></a>
        <a href="subscription.html"><i class="fa-solid fa-gem"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
    </nav>

</body>
</html>
